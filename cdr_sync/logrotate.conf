/path/to/PondCDRSuite/cdr_sync/logs/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 username groupname
}

/path/to/PondCDRSuite/cdr_sync/logs/*.json {
    daily
    rotate 90
    compress
    delaycompress
    missingok
    notifempty
    create 0644 username groupname
}
